name: Daily Visa Requirements Scraper

on:
  # Run every day at 8:00 AM Jakarta time (UTC+7 = 01:00 UTC)
  schedule:
    - cron: "0 1 * * *"

  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # kill job if it hangs over 1 hour

    steps:
      # ── 1. Checkout your repo ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install Python dependencies ──────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            playwright \
            camoufox[geoip] \
            beautifulsoup4 \
            lxml \
            pandas \
            openpyxl \
            requests

      # ── 4. Install Playwright browsers ──────────────────────────────────
      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      # ── 5. Fetch Camoufox (for ACT Cloudflare bypass) ───────────────────
      - name: Fetch Camoufox browser
        run: python -m camoufox fetch

      # ── 6. Run the scraper ───────────────────────────────────────────────
      - name: Run scraper
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
        working-directory: src/scrapers
        run: python main_scraper.py

      # ── 7. Upload CSV as GitHub Actions artifact (30-day retention) ──────
      - name: Upload CSV artifact
        if: always()  # upload even if scraper partially failed
        uses: actions/upload-artifact@v4
        with:
          name: requirements-all-states-${{ github.run_id }}
          path: src/scrapers/output_scrape/combined/requirements_all_states.csv
          retention-days: 30

      # ── 8. Upload log file ───────────────────────────────────────────────
      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: src/scrapers/main_scraper.log
          retention-days: 7
